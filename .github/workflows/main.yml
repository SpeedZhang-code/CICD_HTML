name: CI/CD HTML test

on:
  push:
    branches: [ main ]  

jobs:
  # 1. 將 Build 與 Test 合併為一個 Job
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安裝相依套件
        run: npm install
        
      - name: 執行打包
        run: npm run build

      # 直接在這裡跑測試，就不會出現 "jest: not found"
      - name: 執行自動化測試
        run: npm test   
  
      - name: 上傳打包產物
        uses: actions/upload-artifact@v4
        with:
          name: my-build-files
          path: dist/

  # 2. 部署階段 (保持不變，但 needs 改為指向合併後的 job)
  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: 下載打包產物
        uses: actions/download-artifact@v4
        with:
          name: my-build-files
          path: dist/

      - name: 部署到 GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: dist
