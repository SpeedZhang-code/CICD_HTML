name: CI/CD HTML test

on:
  push:
    branches: [ main ]  # 當程式碼推送到 main 分支時觸發

jobs:

  # CI

  build_and_test:
    runs-on: ubuntu-latest
    steps:
  # 1. 建立階段 (Build)  
      - uses: actions/checkout@v4
      - name: 安裝相依套件
        run: npm install
      - name: 執行打包
        run: npm run build

  # 2. 測試階段 (Test)
      - name: 執行自動化測試
        run: npm test   # 執行 test.js，若失敗則流程終止


  # CD
  # 3. 部署階段 (Deploy)
  deploy:
    needs: build_and_test         # 構建和測試通過才准許部署
    runs-on: ubuntu-latest
    permissions:
      contents: write   # 給予推送到 gh-pages 分支的權限
    steps:
      - uses: actions/checkout@v4
      - name: 部署到 GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages  # 部署到這個分支
          folder: src         # 純 HTML 專案直接部署根目錄
