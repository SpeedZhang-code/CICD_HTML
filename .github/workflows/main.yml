name: CI/CD HTML test

on:
  push:
    branches: [ main ]  

jobs:

  # CI
  build:
    runs-on: ubuntu-latest
    steps:
  # 1. 建立階段 (Build)  
      - uses: actions/checkout@v4

      - name: 設定 Node.js 並啟用快取
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm' # 自動快取 node_modules，下次跑會超快

      - name: 安裝相依套件
        run: npm ci # ci 比 install 更適合自動化環境，更穩定
        
      - name: 執行打包
        run: npm run build
  
  # --- 新增：將打包後的檔案存起來 ---
      - name: 上傳打包產物
        uses: actions/upload-artifact@v4
        with:
          name: my-build-files
          path: |
            dist/
            node_modules/

  # 2. 測試階段 (Test)
  test:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 設定 Node.js 並啟用快取
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm' # 這裡會直接從快取抓，不需要重新下載

      - name: 安裝相依套件
        run: npm ci # 因為有快取，這步通常只需幾秒鐘

      - name: 執行自動化測試
        run: npm test
      


  # CD
  # 3. 部署階段 (Deploy)
  deploy:
    needs: test         # 構建和測試通過才准許部署
    runs-on: ubuntu-latest
    permissions:
      contents: write   # 給予推送到 gh-pages 分支的權限
    steps:
      - uses: actions/checkout@v4

    # --- 新增：把剛才打包好的檔案載回來 ---
      - name: 下載打包產物
        uses: actions/download-artifact@v4
        with:
          name: my-build-files
          path: dist/

      - name: 部署到 GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages  # 部署到這個分支
          folder: dist         # 純 HTML 專案直接部署根目錄

